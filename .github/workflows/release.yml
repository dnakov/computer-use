name: Release

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 'version:' Sources/ComputerUseCLI/ComputerUseCommand.swift | grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Verify identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          swift build -c release --arch arm64 --arch x86_64 --product teach-overlay
          lipo -info .build/apple/Products/Release/computer-use

      - name: Run tests
        run: swift test

      - name: Create TeachOverlay.app bundle
        run: |
          VERSION=${{ steps.version.outputs.version }}
          RELEASE=.build/apple/Products/Release
          mkdir -p $RELEASE/TeachOverlay.app/Contents/MacOS
          cp $RELEASE/teach-overlay $RELEASE/TeachOverlay.app/Contents/MacOS/
          cat > $RELEASE/TeachOverlay.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>teach-overlay</string>
            <key>CFBundleIdentifier</key><string>com.computer-use.teach-overlay</string>
            <key>CFBundleName</key><string>TeachOverlay</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Sign binaries
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          RELEASE=.build/apple/Products/Release

          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --identifier "com.computer-use.teach-overlay" \
            "$RELEASE/TeachOverlay.app"

          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --identifier "com.computer-use" \
            "$RELEASE/computer-use"

          # Verify
          codesign -dvv "$RELEASE/computer-use" 2>&1 | grep Authority
          codesign -dvv "$RELEASE/TeachOverlay.app" 2>&1 | grep Authority

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIST=.build/dist/computer-use-${VERSION}
          mkdir -p $DIST
          cp .build/apple/Products/Release/computer-use $DIST/
          cp -r .build/apple/Products/Release/TeachOverlay.app $DIST/
          cd .build/dist
          tar czf computer-use-${VERSION}.tar.gz computer-use-${VERSION}/
          shasum -a 256 computer-use-${VERSION}.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TARBALL=.build/dist/computer-use-${VERSION}.tar.gz

          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          git tag -d "v${VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Universal binary (arm64 + x86_64) for macOS 14+. Signed with Developer ID." \
            "$TARBALL"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=$(shasum -a 256 .build/dist/computer-use-${VERSION}.tar.gz | cut -d' ' -f1)
          URL="https://github.com/dnakov/computer-use/releases/download/v${VERSION}/computer-use-${VERSION}.tar.gz"

          git clone https://x-access-token:${GH_TOKEN}@github.com/dnakov/homebrew-computer-use.git /tmp/tap
          cd /tmp/tap
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          cat > Formula/computer-use.rb << FORMULA
          class ComputerUse < Formula
            desc "macOS desktop control CLI — screenshots, input simulation, app management"
            homepage "https://github.com/dnakov/computer-use"
            url "${URL}"
            sha256 "${SHA}"
            version "${VERSION}"
            license "MIT"

            def install
              bin.install "computer-use"
              app_dir = libexec/"TeachOverlay.app"
              app_dir.mkpath
              cp_r "TeachOverlay.app/.", app_dir
              ln_sf libexec/"TeachOverlay.app", bin/"TeachOverlay.app"
            end

            def caveats
              <<~EOS
                computer-use requires macOS permissions:
                  - Accessibility (for input simulation)
                  - Screen Recording (for screenshots)
                Grant in System Settings > Privacy & Security.
              EOS
            end

            test do
              assert_match "displayId", shell_output("#{bin}/computer-use display list-all")
              assert_match version.to_s, shell_output("#{bin}/computer-use --version")
            end
          end
          FORMULA

          git add -A
          git commit -m "Update to v${VERSION}"
          git push
